<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Råkoinventering Åstorp</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/rakor-map.css">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; background: #f8f9fa; }
        .page-header { padding: 30px; background: #fff; border-bottom: 1px solid #ddd; z-index: 100; flex-shrink: 0; text-align: center; }
        .page-header h1 { margin: 0 0 10px 0; color: #2b7a78; font-size: 2.5em; }
        .page-content { max-width: 800px; margin: 0 auto; color: #444; font-size: 1.1em; line-height: 1.6; }
        #viewer-container { display: flex; flex-direction: column; flex-grow: 1; height: 100%; position: relative;}
        #map-container { flex-grow: 1; position: relative; width: 100%; }
        #map { position: absolute; top:0; left:0; right:0; bottom:0; }
        
        /* Hide some default ui styles that interfere from rakor-map.css */
        #ui-panel { display: none; }
        #app-container { display: block; height: 100%; width: 100%; }
    </style>
</head>
<body>

<div id="viewer-container">
    <div class="page-header">
        <h1>Råkoinventering Åstorp</h1>
        <div class="page-content">
            <p>Interaktiv karta över de inventerade råkkolonierna inom Åstorps kommun. 
            Varje punkt representerar en registrerad observationspunkt och dess uppskattade antal bon.
            Kolonierna är knutna till specifika rutor (250×250 meter).</p>
        </div>
    </div>
    
    <div id="map-container">
        <div id="app-container">
            <div id="map"></div>
        </div>
    </div>
</div>

<!-- Libraries -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<!-- Config -->
<script>
    const geojsonUrl = 'data/astorp-kommun.geojson';
    const gridUrl = 'data/astorp-grid-250m.geojson';
    const dbUrl = 'data/rakobservations.json';
</script>
<script src="js/rakor-viewer.js"></script>

</body>
</html>
